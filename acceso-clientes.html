<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso clientes | Alditraex</title>
    <link rel="icon" type="image/png" href="logo-300-2022.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="legal-body access-page">
    <header class="site-header site-header--solid">
      <div class="container">
        <a href="index.html" class="logo">
          <img src="logo-300-2022.png" alt="Logotipo de Alditraex" />
          <span></span>
        </a>
        <nav class="main-nav">
          <ul>
            <li><a href="index.html" class="back-link">Volver a inicio</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="access-main">
      <div class="access-main__bg" aria-hidden="true">
        <svg class="access-main__lines" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
          <defs>
            <linearGradient id="accessLineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="rgba(255, 26, 41, 0)" />
              <stop offset="45%" stop-color="rgba(255, 26, 41, 0.35)" />
              <stop offset="100%" stop-color="rgba(179, 0, 15, 0)" />
            </linearGradient>
          </defs>
          <path
            class="access-line access-line--1"
            d="M-60 210 C220 90 420 120 640 200 S1080 160 1320 120"
          />
          <path
            class="access-line access-line--2"
            d="M40 520 C300 420 520 460 760 520 S1180 480 1500 430"
          />
          <path
            class="access-line access-line--3"
            d="M120 760 C380 660 620 700 900 760 S1260 720 1500 680"
          />
        </svg>
        <span class="access-main__orb access-main__orb--one"></span>
        <span class="access-main__orb access-main__orb--two"></span>
        <span class="access-main__orb access-main__orb--three"></span>
      </div>
      <section class="access-hero">
        <div class="container">
          <span class="section__eyebrow">Área privada</span>
          <h1>Selecciona tu acceso de cliente</h1>

          <div class="access-grid">
            <article class="access-card">
              <h2>Web clientes</h2>
              <p>
                Grabación de expediciones, documentación, etiquetado y seguimiento resumido.
              </p>
              <a
                class="btn btn--primary"
                href="https://alditraexweb.nereid.es/"
                target="_blank"
                rel="noopener"
              >
                Entrar a ERP clientes
              </a>
            </article>

            <article class="access-card">
              <h2>Seguimientos</h2>
              <p>
                Seguimiento detallado y envio de link por email/whatsapp.
              </p>
              <a
                class="btn btn--outline"
                href="https://seguimiento.alditraex.es/"
                target="_blank"
                rel="noopener"
              >
                Entrar a Seguimientos
              </a>
            </article>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
